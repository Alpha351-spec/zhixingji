workflows:
  android-release:
    name: 知行计 Release APK
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      flutter: 3.44.6
      java: 17
      ndk: r27
      vars:
        PUB_HOSTED_URL: "https://pub.flutter-io.cn"
        FLUTTER_STORAGE_BASE_URL: "https://storage.flutter-io.cn"

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - ~/.gradle/caches

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true
        - pattern: p0
          include: true
      tag_patterns:
        - pattern: v*
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Build Release APK
        script: |
          # flutter build apk 的 Gradle 构建实际会成功，
          # 但 Flutter 工具可能找不到 APK 路径而报错，用 || true 忽略退出码
          flutter build apk --release \
            --android-skip-build-dependency-validation || true

          # 全局搜索 APK 文件
          echo "=== 搜索所有 APK 文件 ==="
          find . -name "*.apk" -type f 2>/dev/null

          APK_PATH=$(find . -name "*.apk" -path "*/release/*" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find . -name "*.apk" -type f | head -1)
          fi

          if [ -n "$APK_PATH" ]; then
            echo "找到 APK: $APK_PATH"
            mkdir -p build/app/outputs/apk/release
            cp "$APK_PATH" build/app/outputs/apk/release/app-release.apk
            echo "已复制到: build/app/outputs/apk/release/app-release.apk"
            ls -lh build/app/outputs/apk/release/app-release.apk
          else
            echo "=== 错误: 未找到任何 APK 文件 ==="
            exit 1
          fi

    artifacts:
      - build/**/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - 2275199600@qq.com
      scripts:
        - name: Print APK info
          script: |
            echo "=== APK 构建完成 ==="
            find . -name "*.apk" -type f 2>/dev/null
            ls -lh build/app/outputs/apk/release/app-release.apk 2>/dev/null || echo "APK not found at default path"
