workflows:
  android-release:
    name: 知行计 Release APK
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      flutter: 3.44.6
      java: 17
      ndk: r27
      vars:
        PUB_HOSTED_URL: "https://pub.flutter-io.cn"
        FLUTTER_STORAGE_BASE_URL: "https://storage.flutter-io.cn"

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - ~/.gradle/caches

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true
        - pattern: p0
          include: true
      tag_patterns:
        - pattern: v*
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Pre-warm Gradle dependencies
        script: |
          # 预下载关键依赖，避免构建中超时
          cd android
          ./gradlew --refresh-dependencies :app:dependencies --configuration releaseRuntimeClasspath || true
          cd ..

      - name: Build Release APK
        script: |
          # 清理可能缓存了错误的 Gradle 依赖
          rm -rf ~/.gradle/caches/modules-2/files-2.1/org.apache.httpcomponents
          # 构建并输出完整日志（--verbose 显示详细错误）
          flutter build apk --release \
            --android-skip-build-dependency-validation 2>&1 | tee /tmp/build_output.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== 构建失败，输出最后 200 行日志 ==="
            tail -200 /tmp/build_output.log
            exit 1
          fi

    artifacts:
      - build/**/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - 2275199600@qq.com
      scripts:
        - name: Print APK info
          script: |
            echo "=== APK 构建完成 ==="
            find . -name "*.apk" -type f 2>/dev/null
            ls -lh build/app/outputs/apk/release/app-release.apk 2>/dev/null || echo "APK not found at default path"
