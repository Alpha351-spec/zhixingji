workflows:
  android-release:
    name: 知行计 Release APK
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      flutter: 3.44.6
      java: 17
      ndk: r27
      vars:
        PUB_HOSTED_URL: "https://pub.flutter-io.cn"
        FLUTTER_STORAGE_BASE_URL: "https://storage.flutter-io.cn"

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - ~/.gradle/caches

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true
        - pattern: p0
          include: true
      tag_patterns:
        - pattern: v*
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Pre-warm Gradle dependencies
        script: |
          # 预下载关键依赖，避免构建中超时
          cd android
          ./gradlew --refresh-dependencies :app:dependencies --configuration releaseRuntimeClasspath || true
          cd ..

      - name: Build Release APK
        script: |
          # 直接用 Gradle 构建，绕过 Flutter 工具的 APK 路径查找问题
          cd android
          ./gradlew assembleRelease --stacktrace
          cd ..

          # 查找生成的 APK 并复制到 Flutter 期望的路径
          APK_PATH=$(find build -name "*.apk" -path "*/release/*" | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find build -name "*.apk" | head -1)
          fi

          if [ -n "$APK_PATH" ]; then
            echo "找到 APK: $APK_PATH"
            mkdir -p build/app/outputs/apk/release
            cp "$APK_PATH" build/app/outputs/apk/release/app-release.apk
            echo "已复制到: build/app/outputs/apk/release/app-release.apk"
            ls -lh build/app/outputs/apk/release/app-release.apk
          else
            echo "=== 错误: 未找到任何 APK 文件 ==="
            find build -name "*.apk" -type f
            exit 1
          fi

    artifacts:
      - build/**/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - 2275199600@qq.com
      scripts:
        - name: Print APK info
          script: |
            echo "=== APK 构建完成 ==="
            find . -name "*.apk" -type f 2>/dev/null
            ls -lh build/app/outputs/apk/release/app-release.apk 2>/dev/null || echo "APK not found at default path"
