org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.newDsl=false
android.builtInKotlin=false
# 关闭 Kotlin 增量编译，避免缓存锁问题
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
# 禁用稳定资源 ID，避免 AGP 8.9 在 Windows 上的 stableIds.txt bug
android.experimental.stable-ids=false

org.gradle.daemon=false
