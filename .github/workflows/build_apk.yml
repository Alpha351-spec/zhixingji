name: Build Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release --android-skip-build-dependency-validation --verbose

      - name: Find and list APK files
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== build directory structure ==="
          find build -type f 2>/dev/null | head -50
          echo "=== android/build directory ==="
          find android/build -type f 2>/dev/null | head -50

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zhixingji-release-apk
          path: |
            **/*.apk
          retention-days: 30
